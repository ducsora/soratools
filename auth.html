<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoraTools – Đăng nhập</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --primary: #facc15;
      --primary-hover: #eab308;
      --bg: #050505;
      --card: #0f0f0f;
      --card2: #161616;
      --border: #222;
      --text: #fff;
      --muted: #888;
      --danger: #ef4444;
      --success: #22c55e;
      --radius: 16px;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .bg-glow::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(250,204,21,0.08) 0%, transparent 70%);
      top: -100px; left: -100px;
      border-radius: 50%;
      animation: floatA 8s ease-in-out infinite;
    }
    .bg-glow::after {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(250,204,21,0.05) 0%, transparent 70%);
      bottom: -80px; right: -80px;
      border-radius: 50%;
      animation: floatB 10s ease-in-out infinite;
    }
    @keyframes floatA { 0%,100%{transform:translate(0,0);} 50%{transform:translate(40px,30px);} }
    @keyframes floatB { 0%,100%{transform:translate(0,0);} 50%{transform:translate(-30px,-20px);} }

    /* Grid dots BG */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #ffffff0a 1px, transparent 1px);
      background-size: 32px 32px;
      z-index: 0;
    }

    /* Auth container */
    .auth-wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 460px;
      padding: 1rem;
    }

    /* Logo header */
    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-logo .logo-icon {
      width: 56px; height: 56px;
      background: var(--primary);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #000;
      margin-bottom: 0.75rem;
      box-shadow: 0 0 30px rgba(250,204,21,0.3);
    }
    .auth-logo h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -0.5px;
    }
    .auth-logo p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }

    /* Card */
    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(250,204,21,0.04);
      animation: slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes slideUp {
      from { opacity:0; transform: translateY(24px) scale(0.97); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }

    /* Tab switcher */
    .auth-tabs {
      display: flex;
      background: var(--card2);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 1.75rem;
      border: 1px solid var(--border);
    }
    .auth-tab {
      flex: 1;
      padding: 0.6rem;
      text-align: center;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.25s;
      color: var(--muted);
      border: none;
      background: none;
      font-family: inherit;
    }
    .auth-tab.active {
      background: var(--primary);
      color: #000;
      box-shadow: 0 2px 10px rgba(250,204,21,0.3);
    }

    /* Form panels */
    .auth-panel { display: none; }
    .auth-panel.active {
      display: block;
      animation: fadePanel 0.25s ease;
    }
    @keyframes fadePanel { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }

    .panel-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .panel-sub {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }

    /* Form fields */
    .field {
      margin-bottom: 1.1rem;
    }
    .field label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #ccc;
      margin-bottom: 0.45rem;
    }
    .field-wrap {
      position: relative;
    }
    .field-wrap i {
      position: absolute;
      left: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.9rem;
      pointer-events: none;
    }
    .field input {
      width: 100%;
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      padding: 0.75rem 0.95rem 0.75rem 2.5rem;
      border-radius: 10px;
      outline: none;
      transition: all 0.2s;
    }
    .field input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(250,204,21,0.12);
    }
    .field input.error {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(239,68,68,0.1);
    }
    .field input::placeholder { color: #444; }

    /* Password toggle */
    .toggle-pw {
      position: absolute;
      right: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      cursor: pointer;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .toggle-pw:hover { color: var(--text); }

    /* Error / success messages */
    .msg {
      font-size: 0.82rem;
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      margin-bottom: 1rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
    }
    .msg.show { display: flex; }
    .msg.err  { background: rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.2); color:#fca5a5; }
    .msg.ok   { background: rgba(34,197,94,0.1);  border:1px solid rgba(34,197,94,0.2);  color:#86efac; }

    /* Submit button */
    .btn-auth {
      width: 100%;
      background: var(--primary);
      color: #000;
      border: none;
      padding: 0.85rem;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .btn-auth:hover {
      background: var(--primary-hover);
      box-shadow: 0 4px 20px rgba(250,204,21,0.3);
      transform: translateY(-1px);
    }
    .btn-auth:active { transform: translateY(0); }
    .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Password strength */
    .pw-strength {
      margin-top: 0.4rem;
      display: none;
    }
    .pw-strength.show { display: block; }
    .strength-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 0.25rem;
    }
    .strength-fill {
      height: 100%;
      border-radius: 2px;
      transition: all 0.3s;
      width: 0;
    }
    .strength-label { font-size: 0.75rem; color: var(--muted); }

    /* Avatar picker */
    .avatar-pick {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.1rem;
      flex-wrap: wrap;
    }
    .avatar-opt {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--card2);
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .avatar-opt:hover { border-color: var(--muted); transform: scale(1.08); }
    .avatar-opt.selected { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(250,204,21,0.2); }
    .avatar-label { font-size: 0.85rem; font-weight: 600; color: #ccc; margin-bottom: 0.45rem; }

    /* Separator */
    .sep { height: 1px; background: var(--border); margin: 1.25rem 0; }

    /* Footer */
    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--muted);
      font-size: 0.8rem;
    }
    .auth-footer span { color: var(--primary); font-weight: 600; }
  </style>
</head>
<body>
<div class="bg-glow"></div>

<div class="auth-wrap">
  <!-- Logo -->
  <div class="auth-logo">
    <div class="logo-icon"><i class="fa-solid fa-layer-group"></i></div>
    <h1>SoraTools</h1>
    <p>Workspace cá nhân của bạn</p>
  </div>

  <!-- Card -->
  <div class="auth-card">
    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">
        <i class="fa-solid fa-right-to-bracket"></i> Đăng nhập
      </button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">
        <i class="fa-solid fa-user-plus"></i> Đăng ký
      </button>
    </div>

    <!-- LOGIN PANEL -->
    <div class="auth-panel active" id="panel-login">
      <div class="panel-title">Chào mừng trở lại 👋</div>
      <div class="panel-sub">Đăng nhập để tiếp tục với workspace của bạn</div>

      <div class="msg err" id="login-err"><i class="fa-solid fa-circle-exclamation"></i><span></span></div>

      <div class="field">
        <label>Tên đăng nhập</label>
        <div class="field-wrap">
          <i class="fa-solid fa-user"></i>
          <input type="text" id="login-user" placeholder="username" autocomplete="username" spellcheck="false">
        </div>
      </div>
      <div class="field">
        <label>Mật khẩu</label>
        <div class="field-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="login-pw" placeholder="••••••••" autocomplete="current-password">
          <i class="fa-solid fa-eye toggle-pw" id="tpw-login" onclick="togglePw('login-pw','tpw-login')"></i>
        </div>
      </div>

      <button class="btn-auth" id="login-btn" onclick="doLogin()">
        <i class="fa-solid fa-right-to-bracket"></i> Đăng nhập
      </button>
    </div>

    <!-- REGISTER PANEL -->
    <div class="auth-panel" id="panel-register">
      <div class="panel-title">Tạo tài khoản mới ✨</div>
      <div class="panel-sub">Đăng ký để bắt đầu sử dụng SoraTools</div>

      <div class="msg err" id="reg-err"><i class="fa-solid fa-circle-exclamation"></i><span></span></div>
      <div class="msg ok"  id="reg-ok"><i class="fa-solid fa-circle-check"></i><span></span></div>

      <!-- Avatar picker -->
      <div class="avatar-label">Chọn avatar</div>
      <div class="avatar-pick" id="avatar-pick">
        <div class="avatar-opt selected" data-av="🦊" onclick="pickAvatar(this)">🦊</div>
        <div class="avatar-opt" data-av="🐼" onclick="pickAvatar(this)">🐼</div>
        <div class="avatar-opt" data-av="🐸" onclick="pickAvatar(this)">🐸</div>
        <div class="avatar-opt" data-av="🦁" onclick="pickAvatar(this)">🦁</div>
        <div class="avatar-opt" data-av="🐙" onclick="pickAvatar(this)">🐙</div>
        <div class="avatar-opt" data-av="🦄" onclick="pickAvatar(this)">🦄</div>
        <div class="avatar-opt" data-av="🐉" onclick="pickAvatar(this)">🐉</div>
        <div class="avatar-opt" data-av="🤖" onclick="pickAvatar(this)">🤖</div>
      </div>

      <div class="field">
        <label>Tên hiển thị</label>
        <div class="field-wrap">
          <i class="fa-solid fa-id-card"></i>
          <input type="text" id="reg-name" placeholder="Nguyễn Văn A" maxlength="30">
        </div>
      </div>
      <div class="field">
        <label>Tên đăng nhập</label>
        <div class="field-wrap">
          <i class="fa-solid fa-at"></i>
          <input type="text" id="reg-user" placeholder="username (không dấu)" maxlength="20"
            oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9_.]/g,'')">
        </div>
      </div>
      <div class="field">
        <label>Mật khẩu</label>
        <div class="field-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="reg-pw" placeholder="Ít nhất 6 ký tự"
            oninput="checkStrength(this.value)" autocomplete="new-password">
          <i class="fa-solid fa-eye toggle-pw" id="tpw-reg" onclick="togglePw('reg-pw','tpw-reg')"></i>
        </div>
        <div class="pw-strength" id="pw-strength">
          <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
          <div class="strength-label" id="strength-label"></div>
        </div>
      </div>
      <div class="field">
        <label>Xác nhận mật khẩu</label>
        <div class="field-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="reg-pw2" placeholder="Nhập lại mật khẩu" autocomplete="new-password">
          <i class="fa-solid fa-eye toggle-pw" id="tpw-reg2" onclick="togglePw('reg-pw2','tpw-reg2')"></i>
        </div>
      </div>

      <button class="btn-auth" id="reg-btn" onclick="doRegister()">
        <i class="fa-solid fa-user-plus"></i> Tạo tài khoản
      </button>
    </div>
  </div>

  <div class="auth-footer">
    SoraTools &copy; 2026 &nbsp;·&nbsp; Dữ liệu lưu trên <span>trình duyệt của bạn</span>
  </div>
</div>

<script src="auth.js"></script>
<script>
  // Enter key support
  document.getElementById('login-pw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  document.getElementById('login-user').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('login-pw').focus(); });
  document.getElementById('reg-pw2').addEventListener('keydown', e => { if(e.key==='Enter') doRegister(); });
</script>
</body>
</html>
